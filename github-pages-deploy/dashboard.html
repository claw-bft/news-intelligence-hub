<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Intelligence Hub - 热点新闻智能分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border-color: #2a2a3a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .header .timestamp {
            color: var(--accent-primary);
            font-size: 0.9rem;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.1);
        }
        
        .stat-card .icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        
        .stat-card.primary .icon { background: rgba(0, 212, 255, 0.1); color: var(--accent-primary); }
        .stat-card.success .icon { background: rgba(16, 185, 129, 0.1); color: var(--accent-success); }
        .stat-card.warning .icon { background: rgba(245, 158, 11, 0.1); color: var(--accent-warning); }
        .stat-card.danger .icon { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-card .label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }
        
        .chart-card.full-width {
            grid-column: 1 / -1;
        }
        
        .chart-card h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-card h3::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 2px;
        }
        
        .chart-container {
            width: 100%;
            height: 350px;
        }
        
        .chart-container.large {
            height: 500px;
        }
        
        /* News List */
        .news-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }
        
        .news-section h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .news-section h3::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 2px;
        }
        
        .news-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
        }
        
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .news-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .news-item:hover {
            border-color: var(--accent-primary);
            transform: translateX(5px);
        }
        
        .news-item .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }
        
        .news-item .title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }
        
        .news-item .heat-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .heat-high { background: rgba(239, 68, 68, 0.2); color: var(--accent-danger); }
        .heat-medium { background: rgba(245, 158, 11, 0.2); color: var(--accent-warning); }
        .heat-low { background: rgba(16, 185, 129, 0.2); color: var(--accent-success); }
        
        .news-item .summary {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        
        .news-item .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .news-item .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .news-item .tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            background: var(--bg-card);
            color: var(--text-secondary);
        }
        
        .news-item .tag.category {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-primary);
        }
        
        .news-item .source {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .news-item .impact-bar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        
        .impact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .impact-item .label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .impact-item .bar {
            width: 100%;
            height: 6px;
            background: var(--bg-card);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .impact-item .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .impact-item .value {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .chart-container {
                height: 280px;
            }
            
            .news-item .header-row {
                flex-direction: column;
            }
            
            .news-item .meta {
                flex-direction: column;
                align-items: flex-start;
            }
        }
        
        /* Loading Animation */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>News Intelligence Hub</h1>
            <p class="subtitle">热点新闻智能分析与关联可视化</p>
            <p class="timestamp" id="timestamp">数据更新时间: 加载中...</p>
        </div>
        
        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card primary">
                <div class="icon">📰</div>
                <div class="value" id="totalNews">-</div>
                <div class="label">热点新闻总数</div>
            </div>
            <div class="stat-card success">
                <div class="icon">🔥</div>
                <div class="value" id="highImpact">-</div>
                <div class="label">高影响事件</div>
            </div>
            <div class="stat-card warning">
                <div class="icon">📊</div>
                <div class="value" id="avgHeat">-</div>
                <div class="label">平均热度</div>
            </div>
            <div class="stat-card danger">
                <div class="icon">⚠️</div>
                <div class="value" id="negativeNews">-</div>
                <div class="label">负面新闻</div>
            </div>
        </div>
        
        <!-- Charts Grid -->
        <div class="charts-grid">
            <div class="chart-card full-width">
                <h3>新闻关联网络图</h3>
                <div id="networkChart" class="chart-container large"></div>
            </div>
            
            <div class="chart-card">
                <h3>影响维度雷达图</h3>
                <div id="radarChart" class="chart-container"></div>
            </div>
            
            <div class="chart-card">
                <h3>分类分布</h3>
                <div id="categoryChart" class="chart-container"></div>
            </div>
            
            <div class="chart-card">
                <h3>热度趋势</h3>
                <div id="trendChart" class="chart-container"></div>
            </div>
            
            <div class="chart-card">
                <h3>情感分析</h3>
                <div id="sentimentChart" class="chart-container"></div>
            </div>
        </div>
        
        <!-- News List -->
        <div class="news-section">
            <h3>热点新闻详情</h3>
            <div class="news-filters">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="科技">科技</button>
                <button class="filter-btn" data-filter="经济">经济</button>
                <button class="filter-btn" data-filter="政治">政治</button>
                <button class="filter-btn" data-filter="社会">社会</button>
            </div>
            <div class="news-list" id="newsList">
                <!-- News items will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let newsData = null;
        
        // Initialize
        async function init() {
            try {
                const response = await fetch('data.json');
                newsData = await response.json();
                updateUI();
            } catch (error) {
                console.error('Failed to load data:', error);
                document.getElementById('timestamp').textContent = '数据加载失败';
            }
        }
        
        // Update UI
        function updateUI() {
            if (!newsData) return;
            
            // Update timestamp
            const date = new Date(newsData.timestamp);
            document.getElementById('timestamp').textContent = 
                `数据更新时间: ${date.toLocaleString('zh-CN')}`;
            
            // Update stats
            document.getElementById('totalNews').textContent = newsData.stats.total;
            document.getElementById('highImpact').textContent = newsData.stats.highImpact;
            document.getElementById('avgHeat').textContent = newsData.stats.avgHeat.toFixed(1);
            document.getElementById('negativeNews').textContent = newsData.stats.sentiment.negative;
            
            // Render charts
            renderNetworkChart();
            renderRadarChart();
            renderCategoryChart();
            renderTrendChart();
            renderSentimentChart();
            
            // Render news list
            renderNewsList('all');
            
            // Setup filters
            setupFilters();
        }
        
        // Network Chart
        function renderNetworkChart() {
            const chart = echarts.init(document.getElementById('networkChart'));
            
            const nodes = newsData.news.map(item => ({
                id: item.id,
                name: item.title.substring(0, 20) + '...',
                fullTitle: item.title,
                value: item.heat,
                category: item.category,
                symbolSize: Math.sqrt(item.heat) * 5,
                itemStyle: {
                    color: getCategoryColor(item.category)
                }
            }));
            
            const links = newsData.relations.map(rel => ({
                source: rel.source,
                target: rel.target,
                value: rel.strength,
                lineStyle: {
                    width: rel.strength * 3,
                    curveness: 0.2
                }
            }));
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.dataType === 'node') {
                            return `<strong>${params.data.fullTitle}</strong><br/>
                                    热度: ${params.data.value}<br/>
                                    分类: ${params.data.category}`;
                        }
                        return `${params.data.source} → ${params.data.target}<br/>关联强度: ${(params.data.value * 100).toFixed(0)}%`;
                    },
                    backgroundColor: 'rgba(26, 26, 37, 0.95)',
                    borderColor: '#2a2a3a',
                    textStyle: { color: '#fff' }
                },
                legend: {
                    data: ['科技', '经济', '政治', '社会'],
                    textStyle: { color: '#a1a1aa' },
                    bottom: 10
                },
                series: [{
                    type: 'graph',
                    layout: 'force',
                    data: nodes,
                    links: links,
                    categories: [
                        { name: '科技', itemStyle: { color: '#00d4ff' } },
                        { name: '经济', itemStyle: { color: '#10b981' } },
                        { name: '政治', itemStyle: { color: '#f59e0b' } },
                        { name: '社会', itemStyle: { color: '#ef4444' } }
                    ],
                    roam: true,
                    label: {
                        show: true,
                        position: 'right',
                        formatter: '{b}',
                        fontSize: 11,
                        color: '#a1a1aa'
                    },
                    force: {
                        repulsion: 300,
                        gravity: 0.1,
                        edgeLength: 150
                    },
                    emphasis: {
                        focus: 'adjacency',
                        lineStyle: { width: 5 }
                    }
                }]
            };
            
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        // Radar Chart
        function renderRadarChart() {
            const chart = echarts.init(document.getElementById('radarChart'));
            
            const avgImpact = newsData.stats.impactDistribution;
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    backgroundColor: 'rgba(26, 26, 37, 0.95)',
                    borderColor: '#2a2a3a',
                    textStyle: { color: '#fff' }
                },
                radar: {
                    indicator: [
                        { name: '社会影响', max: 10 },
                        { name: '经济影响', max: 10 },
                        { name: '政治影响', max: 10 },
                        { name: '科技影响', max: 10 }
                    ],
                    shape: 'polygon',
                    splitNumber: 5,
                    axisName: {
                        color: '#a1a1aa',
                        fontSize: 12
                    },
                    splitLine: {
                        lineStyle: { color: '#2a2a3a' }
                    },
                    splitArea: {
                        areaStyle: {
                            color: ['rgba(0, 212, 255, 0.05)', 'rgba(0, 212, 255, 0.1)']
                        }
                    },
                    axisLine: {
                        lineStyle: { color: '#2a2a3a' }
                    }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: [
                            avgImpact.social,
                            avgImpact.economic,
                            avgImpact.political,
                            avgImpact.tech
                        ],
                        name: '平均影响维度',
                        areaStyle: {
                            color: 'rgba(0, 212, 255, 0.3)'
                        },
                        lineStyle: {
                            color: '#00d4ff',
                            width: 2
                        },
                        itemStyle: {
                            color: '#00d4ff'
                        }
                    }]
                }]
            };
            
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        // Category Chart
        function renderCategoryChart() {
            const chart = echarts.init(document.getElementById('categoryChart'));
            
            const categories = newsData.stats.categories;
            const data = Object.entries(categories).map(([name, value]) => ({
                name,
                value
            }));
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(26, 26, 37, 0.95)',
                    borderColor: '#2a2a3a',
                    textStyle: { color: '#fff' },
                    formatter: '{b}: {c} ({d}%)'
                },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '50%'],
                    data: data,
                    itemStyle: {
                        borderRadius: 8,
                        borderColor: '#1a1a25',
                        borderWidth: 2
                    },
                    label: {
                        color: '#a1a1aa',
                        formatter: '{b}\n{c}'
                    },
                    color: ['#00d4ff', '#10b981', '#f59e0b', '#ef4444']
                }]
            };
            
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        // Trend Chart
        function renderTrendChart() {
            const chart = echarts.init(document.getElementById('trendChart'));
            
            const sortedNews = [...newsData.news].sort((a, b) => 
                new Date(a.timestamp) - new Date(b.timestamp)
            );
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(26, 26, 37, 0.95)',
                    borderColor: '#2a2a3a',
                    textStyle: { color: '#fff' }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: sortedNews.map(item => {
                        const date = new Date(item.timestamp);
                        return `${date.getMonth() + 1}/${date.getDate()}`;
                    }),
                    axisLine: { lineStyle: { color: '#2a2a3a' } },
                    axisLabel: { color: '#a1a1aa', fontSize: 10 }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { lineStyle: { color: '#2a2a3a' } },
                    axisLabel: { color: '#a1a1aa' },
                    splitLine: { lineStyle: { color: '#2a2a3a' } }
                },
                series: [{
                    type: 'line',
                    data: sortedNews.map(item => item.heat),
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 8,
                    lineStyle: {
                        color: '#00d4ff',
                        width: 3
                    },
                    itemStyle: {
                        color: '#00d4ff',
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    areaStyle: {
                        color: {
                            type: 'linear',
                            x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: 'rgba(0, 212, 255, 0.4)' },
                                { offset: 1, color: 'rgba(0, 212, 255, 0.05)' }
                            ]
                        }
                    }
                }]
            };
            
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        // Sentiment Chart
        function renderSentimentChart() {
            const chart = echarts.init(document.getElementById('sentimentChart'));
            
            const sentiment = newsData.stats.sentiment;
            const data = [
                { name: '正面', value: sentiment.positive, itemStyle: { color: '#10b981' } },
                { name: '中性', value: sentiment.neutral, itemStyle: { color: '#f59e0b' } },
                { name: '负面', value: sentiment.negative, itemStyle: { color: '#ef4444' } }
            ];
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(26, 26, 37, 0.95)',
                    borderColor: '#2a2a3a',
                    textStyle: { color: '#fff' },
                    formatter: '{b}: {c} ({d}%)'
                },
                series: [{
                    type: 'pie',
                    radius: '70%',
                    center: ['50%', '50%'],
                    data: data,
                    roseType: 'radius',
                    itemStyle: {
                        borderRadius: 8,
                        borderColor: '#1a1a25',
                        borderWidth: 2
                    },
                    label: {
                        color: '#a1a1aa',
                        formatter: '{b}\n{c}'
                    }
                }]
            };
            
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        // Render News List
        function renderNewsList(filter) {
            const container = document.getElementById('newsList');
            let filteredNews = newsData.news;
            
            if (filter !== 'all') {
                filteredNews = newsData.news.filter(item => item.category === filter);
            }
            
            // Sort by heat
            filteredNews = filteredNews.sort((a, b) => b.heat - a.heat);
            
            container.innerHTML = filteredNews.map(item => `
                <div class="news-item" data-category="${item.category}">
                    <div class="header-row">
                        <div class="title">${item.title}</div>
                        <span class="heat-badge ${getHeatClass(item.heat)}">${item.heat}°</span>
                    </div>
                    <div class="summary">${item.summary}</div>
                    <div class="meta">
                        <div class="tags">
                            <span class="tag category">${item.category}</span>
                            ${item.keywords.slice(0, 3).map(kw => `<span class="tag">${kw}</span>`).join('')}
                        </div>
                        <span class="source">${item.source}</span>
                    </div>
                    <div class="impact-bar">
                        <div class="impact-item">
                            <span class="label">社会</span>
                            <div class="bar"><div class="fill" style="width: ${item.impact.social * 10}%; background: #ef4444;"></div></div>
                            <span class="value">${item.impact.social}</span>
                        </div>
                        <div class="impact-item">
                            <span class="label">经济</span>
                            <div class="bar"><div class="fill" style="width: ${item.impact.economic * 10}%; background: #10b981;"></div></div>
                            <span class="value">${item.impact.economic}</span>
                        </div>
                        <div class="impact-item">
                            <span class="label">政治</span>
                            <div class="bar"><div class="fill" style="width: ${item.impact.political * 10}%; background: #f59e0b;"></div></div>
                            <span class="value">${item.impact.political}</span>
                        </div>
                        <div class="impact-item">
                            <span class="label">科技</span>
                            <div class="bar"><div class="fill" style="width: ${item.impact.tech * 10}%; background: #00d4ff;"></div></div>
                            <span class="value">${item.impact.tech}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Setup Filters
        function setupFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderNewsList(btn.dataset.filter);
                });
            });
        }
        
        // Helper Functions
        function getCategoryColor(category) {
            const colors = {
                '科技': '#00d4ff',
                '经济': '#10b981',
                '政治': '#f59e0b',
                '社会': '#ef4444'
            };
            return colors[category] || '#a1a1aa';
        }
        
        function getHeatClass(heat) {
            if (heat >= 90) return 'heat-high';
            if (heat >= 80) return 'heat-medium';
            return 'heat-low';
        }
        
        // Start
        init();
    </script>
</body>
</html>
