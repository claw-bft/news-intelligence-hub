<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关联网络 - News Intelligence Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid #333; }
        h1 { font-size: 2rem; color: #00d4ff; }
        .subtitle { color: #888; margin-top: 10px; }
        
        .nav { display: flex; justify-content: center; gap: 20px; padding: 20px 0; flex-wrap: wrap; }
        .nav a { 
            color: #888; text-decoration: none; padding: 10px 20px; 
            border-radius: 8px; transition: all 0.3s;
        }
        .nav a:hover, .nav a.active { background: #1a1a25; color: #00d4ff; }
        
        #network-chart { width: 100%; height: 600px; margin-top: 30px; }
        
        .stats { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-top: 30px;
        }
        .stat-card { 
            background: #1a1a25; padding: 20px; border-radius: 12px;
            text-align: center; border: 1px solid #2a2a35;
        }
        .stat-value { font-size: 2rem; color: #00d4ff; font-weight: bold; }
        .stat-label { color: #888; margin-top: 8px; }
        
        footer { text-align: center; padding: 40px 0; color: #666; border-top: 1px solid #333; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>新闻关联网络</h1>
            <p class="subtitle">基于语义相似度、实体共现、时间邻近度的多维关联分析</p>
        </header>
        
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="hourly.html">小时榜</a>
            <a href="daily.html">日榜</a>
            <a href="weekly.html">周榜</a>
            <a href="monthly.html">月榜</a>
            <a href="yearly.html">年榜</a>
            <a href="relations.html" class="active">关联网络</a>
        </nav>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value">10</div>
                <div class="stat-label">新闻节点</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">17</div>
                <div class="stat-label">关联关系</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">3</div>
                <div class="stat-label">话题聚类</div>
            </div>
        </div>
        
        <div id="network-chart"></div>
        
        <footer>
            <p>News Intelligence Hub · 自动化新闻聚合与分析</p>
        </footer>
    </div>
    
    <script>
        const chart = echarts.init(document.getElementById('network-chart'));
        
        const nodes = [{"id": "news-2026030418-001", "title": "AGI安全框架全球协议达成", "heat": 98.5, "category": "科技", "full_title": "AGI安全框架全球协议达成"}, {"id": "news-2026030418-002", "title": "亚洲数字货币联盟正式启动", "heat": 95.2, "category": "经济", "full_title": "亚洲数字货币联盟正式启动"}, {"id": "news-2026030418-003", "title": "北极资源开发国际公约签署", "heat": 92.0, "category": "政治", "full_title": "北极资源开发国际公约签署"}, {"id": "news-2026030418-004", "title": "全球首例脑机接口商业应用获批", "heat": 89.5, "category": "科技", "full_title": "全球首例脑机接口商业应用获批"}, {"id": "news-2026030418-005", "title": "量子计算破解RSA加密演示", "heat": 87.3, "category": "科技", "full_title": "量子计算破解RSA加密演示"}, {"id": "news-2026030417-001", "title": "AGI安全框架全球协议达成", "heat": 98.5, "category": "科技", "full_title": "AGI安全框架全球协议达成"}, {"id": "news-2026030417-002", "title": "亚洲数字货币联盟正式启动", "heat": 95.2, "category": "经济", "full_title": "亚洲数字货币联盟正式启动"}, {"id": "news-2026030417-003", "title": "北极资源开发国际公约签署", "heat": 92.0, "category": "政治", "full_title": "北极资源开发国际公约签署"}, {"id": "news-2026030417-004", "title": "全球首例脑机接口商业应用获批", "heat": 89.5, "category": "科技", "full_title": "全球首例脑机接口商业应用获批"}, {"id": "news-2026030417-005", "title": "量子计算破解RSA加密演示", "heat": 87.3, "category": "科技", "full_title": "量子计算破解RSA加密演示"}];
        const links = [{"source": "news-2026030418-001", "target": "news-2026030418-004", "strength": 0.35, "type": "weak"}, {"source": "news-2026030418-001", "target": "news-2026030418-005", "strength": 0.35, "type": "weak"}, {"source": "news-2026030418-001", "target": "news-2026030417-001", "strength": 1.0, "type": "strong"}, {"source": "news-2026030418-001", "target": "news-2026030417-004", "strength": 0.35, "type": "weak"}, {"source": "news-2026030418-001", "target": "news-2026030417-005", "strength": 0.35, "type": "weak"}, {"source": "news-2026030418-002", "target": "news-2026030417-002", "strength": 1.0, "type": "strong"}, {"source": "news-2026030418-003", "target": "news-2026030417-003", "strength": 1.0, "type": "strong"}, {"source": "news-2026030418-004", "target": "news-2026030418-005", "strength": 0.35, "type": "weak"}, {"source": "news-2026030418-004", "target": "news-2026030417-001", "strength": 0.35, "type": "weak"}, {"source": "news-2026030418-004", "target": "news-2026030417-004", "strength": 1.0, "type": "strong"}, {"source": "news-2026030418-004", "target": "news-2026030417-005", "strength": 0.35, "type": "weak"}, {"source": "news-2026030418-005", "target": "news-2026030417-001", "strength": 0.35, "type": "weak"}, {"source": "news-2026030418-005", "target": "news-2026030417-004", "strength": 0.35, "type": "weak"}, {"source": "news-2026030418-005", "target": "news-2026030417-005", "strength": 1.0, "type": "strong"}, {"source": "news-2026030417-001", "target": "news-2026030417-004", "strength": 0.35, "type": "weak"}, {"source": "news-2026030417-001", "target": "news-2026030417-005", "strength": 0.35, "type": "weak"}, {"source": "news-2026030417-004", "target": "news-2026030417-005", "strength": 0.35, "type": "weak"}];
        
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    if (params.dataType === 'node') {
                        return params.data.full_title + '<br/>热度: ' + params.data.heat;
                    }
                    return params.data.source + ' → ' + params.data.target + '<br/>关联度: ' + params.data.strength;
                }
            },
            series: [{
                type: 'graph',
                layout: 'force',
                data: nodes.map(n => ({
                    id: n.id,
                    name: n.title,
                    value: n.heat,
                    symbolSize: Math.sqrt(n.heat) * 3,
                    itemStyle: {
                        color: n.category === '科技' ? '#00d4ff' : 
                               n.category === '经济' ? '#7c3aed' :
                               n.category === '政治' ? '#ff6b6b' : '#ffd700'
                    }
                })),
                links: links.map(l => ({
                    source: l.source,
                    target: l.target,
                    value: l.strength,
                    lineStyle: {
                        width: l.strength * 5,
                        opacity: l.strength,
                        color: l.type === 'strong' ? '#ff6b6b' :
                               l.type === 'medium' ? '#ffd700' : '#888'
                    }
                })),
                roam: true,
                label: {
                    show: true,
                    position: 'right',
                    formatter: '{b}',
                    color: '#fff',
                    fontSize: 10
                },
                force: {
                    repulsion: 300,
                    edgeLength: [50, 200],
                    gravity: 0.1
                }
            }]
        };
        
        chart.setOption(option);
        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
